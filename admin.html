<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Smart Guard - Admin Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #cc0000; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; padding: 20px; }
        .admin-card { background: var(--card); padding: 30px; border-radius: 16px; max-width: 1000px; margin: auto; }
        .stats-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; }
        .stat-item { background: #334155; padding: 15px; border-radius: 12px; text-align: center; }
        .stat-item b { font-size: 24px; color: #38bdf8; display: block; }
        table { width: 100%; border-collapse: collapse; background: #fff; color: #1e293b; border-radius: 8px; overflow: hidden; }
        th { background: var(--primary); color: #fff; padding: 15px; }
        td { padding: 15px; border-bottom: 1px solid #ddd; text-align: center; }
        .sos-1 { background: #fff7ed !important; color: #c2410c; } /* Màu cam cho vùng an toàn */
        .sos-2 { background: #fee2e2 !important; color: #991b1b; animation: pulse 1s infinite; } /* Màu đỏ cho nút nhấn */
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .btn-del { background: #ef4444; color: #fff; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2 style="text-align:center">QUẢN TRỊ HỆ THỐNG</h2>
    <div id="auth" style="text-align:center">
        <input type="password" id="pass" placeholder="Mã Admin" style="padding:10px; border-radius:8px;">
        <button onclick="login()" style="padding:10px 20px; cursor:pointer">XÁC THỰC</button>
    </div>

    <div id="dash" style="display:none">
        <div class="stats-bar">
            <div class="stat-item">TỔNG THIẾT BỊ <b id="tDev">0</b></div>
            <div class="stat-item">ĐANG SOS <b id="tSos" style="color:#ef4444">0</b></div>
        </div>
        <table>
            <thead>
                <tr><th>ID</th><th>Tên</th><th>Mật Khẩu</th><th>Trạng Thái</th><th>Thao Tác</th></tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://smartguard-25e26-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let lastStates = {};

    function login() {
        if(document.getElementById('pass').value === "123") {
            document.getElementById('auth').style.display='none';
            document.getElementById('dash').style.display='block';
            loadData();
        } else { alert("Sai mã!"); }
    }

    function loadData() {
        db.ref('SmartGuard').on('value', (snap) => {
            const list = document.getElementById('list');
            let count = 0, sos = 0;
            list.innerHTML = "";
            snap.forEach(c => {
                count++;
                const d = c.val();
                const s = Number(d.sos || 0);
                if(s !== 0) {
                    sos++;
                    if(!lastStates[c.key] || lastStates[c.key] === 0) {
                        alert(`🚨 CẢNH BÁO: Thiết bị #${c.key} vừa gửi tín hiệu SOS loại ${s}!`);
                    }
                }
                lastStates[c.key] = s;

                let statusText = "✅ Bình thường";
                let rowClass = "";
                if(s === 1) { statusText = "⚠️ NGO
