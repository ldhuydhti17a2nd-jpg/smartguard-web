<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Guard - Hệ Thống Giám Sát Thông Minh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #d32f2f;
            --primary-blue: #1a73e8;
            --bg-color: #f4f7f6;
            --text-dark: #2c3e50;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-color); 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-dark);
        }

        .card { 
            background: #fff; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            max-width: 420px; 
            width: 90%;
        }

        .header-logo { text-align: center; margin-bottom: 25px; }
        .header-logo h2 { color: var(--primary-red); font-size: 24px; font-weight: 800; margin: 0; }
        .header-logo p { font-size: 12px; color: #7f8c8d; margin-top: 5px; text-transform: uppercase; }

        label { font-weight: 600; display: block; margin-top: 15px; font-size: 14px; color: #555; }

        input { 
            width: 100%; padding: 14px; margin-top: 8px; 
            border: 2px solid #edf2f7; border-radius: 12px; 
            box-sizing: border-box; font-size: 16px;
        }

        /* --- PHẦN QUAN TRỌNG: FIX NÚT --- */
        .btn { 
            width: 100%; 
            padding: 16px; 
            margin-top: 15px; /* Khoảng cách giữa các nút */
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 15px;
            cursor: pointer; 
            color: #fff; 
            display: block; /* Ép hiển thị dạng khối để không bị lệch */
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .btn-red { background: linear-gradient(135deg, #ff5252 0%, #d32f2f 100%); box-shadow: 0 4px 15px rgba(211, 47, 47, 0.2); }
        .btn-blue { background: linear-gradient(135deg, #42a5f5 0%, #1a73e8 100%); box-shadow: 0 4px 15px rgba(26, 115, 232, 0.2); }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .forgot-btn { background: none; border: none; color: var(--primary-blue); cursor: pointer; width: 100%; margin-top: 15px; font-weight: 600; }
        .hidden { display: none; }
        .info-box { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px dashed #cbd5e0; margin-bottom: 10px; }
        .loading-spinner { display: none; text-align: center; margin-top: 10px; color: var(--primary-blue); }
    </style>
</head>
<body>

<div class="card">
    <div class="header-logo">
        <h2>SMART GUARD</h2>
        <p>Hệ thống giám sát balo thông minh</p>
    </div>

    <div id="loginSection">
        <label>ID THIẾT BỊ</label>
        <input type="text" id="regId" placeholder="Nhập ID">
        <label>MẬT KHẨU</label>
        <input type="password" id="regPass" placeholder="••••••••">
        <button class="btn btn-red" onclick="accessBalo()">VÀO HỆ THỐNG</button>
        <button class="forgot-btn" onclick="startForgotPass()">Quên mật khẩu?</button>
    </div>

    <div id="otpSection" class="hidden">
        <div class="info-box"><p style="text-align:center; color:var(--primary-blue); margin:0;">Mã OTP đã gửi đến Gmail</p></div>
        <input type="text" id="otpInput" placeholder="6 số OTP" maxlength="6" style="text-align:center; letter-spacing:5px;">
        <button class="btn btn-blue" onclick="verifyOTP()">XÁC NHẬN MÃ</button>
    </div>

    <div id="infoSection" class="hidden">
        <div class="info-box">
            <label style="margin-top:0">Tên của trẻ</label>
            <input type="text" id="regName">
            <label>Gmail phụ huynh</label>
            <input type="email" id="regEmail" readonly style="background:#f1f1f1;">
        </div>
        <label>Đổi mật khẩu mới</label>
        <input type="password" id="newPass" placeholder="Bỏ trống nếu không đổi">
        
        <button class="btn btn-red" onclick="handleUpdate()">CẬP NHẬT THÔNG TIN</button>
        <a id="mapLink" href="#" target="_blank" class="btn btn-blue">XEM VỊ TRÍ HIỆN TẠI</a>
    </div>

    <div id="loading" class="loading-spinner">Đang xử lý...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://smartguard-25e26-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentOTP = "", flowType = "", tempEmail = "";

    function accessBalo() {
        const id = document.getElementById('regId').value.trim();
        const pass = document.getElementById('regPass').value;
        if(!id) return alert("Vui lòng nhập ID!");
        toggleLoading(true);
        db.ref('SmartGuard/' + id).once('value', (snap) => {
            toggleLoading(false);
            const data = snap.val();
            if(!data) { 
                flowType = "REGISTER"; tempEmail = prompt("Nhập Gmail phụ huynh:"); 
                if(tempEmail) sendOTP(tempEmail); 
            } else if(data.password === pass) { showInfo(data); }
            else { alert("Sai mật khẩu!"); }
        });
    }

    function sendOTP(email) {
        currentOTP = Math.floor(100000 + Math.random() * 900000).toString();
        db.ref('OTP_Requests').set({ to_email: email, otp_code: currentOTP, timestamp: Date.now() });
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('otpSection').classList.remove('hidden');
    }

    function verifyOTP() {
        if(document.getElementById('otpInput').value === currentOTP) {
            if(flowType === "REGISTER") {
                const id = document.getElementById('regId').value.trim();
                const initialData = { child_name: "Bé mới", parent_email: tempEmail, password: "123", sos: 0 };
                db.ref('SmartGuard/' + id).set(initialData).then(() => showInfo(initialData));
            } else {
                document.getElementById('otpSection').classList.add('hidden');
                document.getElementById('infoSection').classList.remove('hidden');
            }
        } else { alert("OTP sai!"); }
    }

    function showInfo(data) {
        document.getElementById('otpSection').classList.add('hidden');
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('infoSection').classList.remove('hidden');
        document.getElementById('regName').value = data.child_name || "";
        document.getElementById('regEmail').value = data.parent_email || "";
        
        if (data.vi_do && data.kinh_do) {
            // Fix link template literal
            document.getElementById('mapLink').href = `https://www.google.com/maps/search/?api=1&query=${data.vi_do},${data.kinh_do}`;
            document.getElementById('mapLink').style.display = "block";
        } else {
            document.getElementById('mapLink').onclick = () => alert("Chưa có tọa độ!");
        }
    }

    function handleUpdate() {
        const id = document.getElementById('regId').value.trim();
        const nPass = document.getElementById('newPass').value;
        const uData = { child_name: document.getElementById('regName').value, parent_email: document.getElementById('regEmail').value, sos: 0 };
        if(nPass) uData.password = nPass;
        db.ref('SmartGuard/' + id).update(uData).then(() => { alert("Thành công!"); location.reload(); });
    }

    function startForgotPass() {
        const id = document.getElementById('regId').value.trim();
        db.ref('SmartGuard/' + id).once('value', (snap) => {
            const data = snap.val();
            if(data && data.parent_email) { flowType = "FORGOT"; sendOTP(data.parent_email); }
            else { alert("Không tìm thấy ID!"); }
        });
    }

    function toggleLoading(show) { document.getElementById('loading').style.display = show ? 'block' : 'none'; }
</script>
</body>
</html>
