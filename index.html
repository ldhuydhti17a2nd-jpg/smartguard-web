<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Guard - Phụ Huynh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #d32f2f; --blue: #1a73e8; --orange: #ef6c00; --bg: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 420px; width: 90%; box-sizing: border-box; }
        .header-logo { text-align: center; margin-bottom: 25px; }
        .header-logo h2 { color: var(--red); margin: 0; font-weight: 800; }
        
        label { font-weight: 600; display: block; margin-top: 15px; font-size: 14px; color: #555; }
        input { width: 100%; padding: 14px; margin-top: 8px; border: 2px solid #edf2f7; border-radius: 12px; box-sizing: border-box; font-size: 16px; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .btn { 
            width: 100%; padding: 16px 0; border: none; border-radius: 12px; 
            font-weight: 700; font-size: 15px; cursor: pointer; color: #fff; 
            display: flex; align-items: center; justify-content: center;
            text-align: center; text-decoration: none; text-transform: uppercase;
            box-sizing: border-box; transition: all 0.3s ease;
        }
        .btn-red { background: linear-gradient(135deg, #ff5252, #d32f2f); }
        .btn-blue { background: linear-gradient(135deg, #42a5f5, #1a73e8); }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .forgot-link { display: block; text-align: center; margin-top: 15px; color: var(--blue); text-decoration: none; font-size: 14px; font-weight: 600; cursor: pointer; }
        .hidden { display: none; }
        .info-box { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px dashed #cbd5e0; margin-bottom: 10px; }
        
        .sos-1 { border: 3px solid var(--orange); animation: p-orange 1s infinite; }
        .sos-2 { border: 3px solid var(--red); animation: p-red 1s infinite; }
        @keyframes p-red { 0% { box-shadow: 0 0 0 0px rgba(211,47,47,0.4); } 70% { box-shadow: 0 0 0 10px rgba(211,47,47,0); } }
        @keyframes p-orange { 0% { box-shadow: 0 0 0 0px rgba(239,108,0,0.4); } 70% { box-shadow: 0 0 0 10px rgba(239,108,0,0); } }
        #sosAlertBox { padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <div class="header-logo"><h2>SMART GUARD</h2><p>Giám sát balo thông minh</p></div>

    <div id="loginSection">
        <label>ID THIẾT BỊ</label><input type="text" id="regId" placeholder="Nhập ID">
        <label>MẬT KHẨU</label><input type="password" id="regPass" placeholder="••••••••">
        <button class="btn btn-red" style="margin-top:20px;" onclick="accessBalo()">VÀO HỆ THỐNG</button>
        <span class="forgot-link" onclick="startForgotPass()">Quên mật khẩu?</span>
    </div>

    <div id="otpSection" class="hidden">
        <div class="info-box"><p style="text-align:center; color:var(--blue); margin:0;">Mã OTP đã gửi đến Gmail của bạn</p></div>
        <input type="text" id="otpInput" placeholder="Nhập 6 số OTP" maxlength="6" style="text-align:center; letter-spacing:5px;">
        <button class="btn btn-blue" style="margin-top:15px;" onclick="verifyOTP()">XÁC NHẬN OTP</button>
    </div>

    <div id="infoSection" class="hidden">
        <div id="sosAlertBox" class="hidden"></div>
        <div class="info-box">
            <label style="margin:0">Tên của trẻ</label><input type="text" id="regName">
            <label>Gmail phụ huynh</label><input type="email" id="regEmail" readonly style="background:#f1f1f1">
            <label>Mật khẩu mới</label><input type="password" id="newPass" placeholder="Nhập nếu muốn đổi">
        </div>
        <div class="btn-group">
            <button class="btn btn-red" onclick="handleUpdate()">CẬP NHẬT THÔNG TIN</button>
            <a id="mapLink" href="#" target="_blank" class="btn btn-blue">XEM VỊ TRÍ HIỆN TẠI</a>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://smartguard-25e26-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let lastSos = 0, currentOTP = "", savedData = null;

    function accessBalo() {
        const id = document.getElementById('regId').value.trim();
        const pass = document.getElementById('regPass').value;
        if(!id) return alert("Vui lòng nhập ID!");
        
        db.ref('SmartGuard/' + id).once('value', (snap) => {
            const data = snap.val();
            if(data && data.password === pass) { 
                savedData = data;
                showInfo(data); startSOSListener(id);
            } else { alert("Sai ID hoặc mật khẩu!"); }
        });
    }

    // --- LOGIC QUÊN MẬT KHẨU ---
    function startForgotPass() {
        const id = document.getElementById('regId').value.trim();
        if(!id) return alert("Vui lòng nhập ID thiết bị trước!");

        db.ref('SmartGuard/' + id).once('value', (snap) => {
            const data = snap.val();
            if(data && data.parent_email) {
                savedData = data;
                currentOTP = Math.floor(100000 + Math.random() * 900000).toString();
                // Gửi yêu cầu OTP lên Firebase để Script Gmail xử lý
                db.ref('OTP_Requests').set({
                    to_email: data.parent_email,
                    otp_code: currentOTP,
                    timestamp: Date.now()
                }).then(() => {
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('otpSection').classList.remove('hidden');
                });
            } else { alert("ID không tồn tại hoặc chưa đăng ký Email!"); }
        });
    }

    function verifyOTP() {
        const input = document.getElementById('otpInput').value;
        if(input === currentOTP) {
            document.getElementById('otpSection').classList.add('hidden');
            showInfo(savedData);
            startSOSListener(document.getElementById('regId').value.trim());
        } else { alert("Mã OTP không chính xác!"); }
    }

    function startSOSListener(id) {
        db.ref('SmartGuard/' + id + '/sos').on('value', (snap) => {
            const val = Number(snap.val() || 0);
            const card = document.getElementById('mainCard');
            const box = document.getElementById('sosAlertBox');
            card.classList.remove('sos-1', 'sos-2');
            if(val !== 0) {
                box.classList.remove('hidden');
                if(val === 1) {
                    box.innerHTML = "⚠️ RA KHỎI VÙNG AN TOÀN";
                    box.style.cssText = "background:#fff3e0; color:#ef6c00";
                    card.classList.add('sos-1');
                    if(lastSos === 0) alert("Cảnh báo: Trẻ rời vùng an toàn!");
                } else if(val === 2) {
                    box.innerHTML = "🚨 KHẨN CẤP: NHẤN NÚT SOS";
                    box.style.cssText = "background:#ffebee; color:#c62828";
                    card.classList.add('sos-2');
                    if(lastSos === 0) alert("Nguy hiểm: Trẻ nhấn nút khẩn cấp!");
                }
            } else { box.classList.add('hidden'); }
            lastSos = val;
        });
    }

    function showInfo(data) {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('infoSection').classList.remove('hidden');
        document.getElementById('regName').value = data.child_name || "";
        document.getElementById('regEmail').value = data.parent_email || "";
        if(data.vi_do) document.getElementById('mapLink').href = `https://www.google.com/maps?q=${data.vi_do},${data.kinh_do}`;
    }

    function handleUpdate() {
        const id = document.getElementById('regId').value.trim();
        const newP = document.getElementById('newPass').value;
        let updateData = { child_name: document.getElementById('regName').value };
        if(newP) updateData.password = newP;

        db.ref('SmartGuard/' + id).update(updateData).then(() => {
            alert("Đã cập nhật thông tin thành công!");
            if(newP) location.reload(); // Load lại nếu đổi pass
        });
    }
</script>
</body>
</html>
