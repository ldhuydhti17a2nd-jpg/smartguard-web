<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Guard - Hệ Thống Giám Sát Thông Minh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #d32f2f;
            --primary-blue: #1a73e8;
            --bg-color: #f4f7f6;
            --text-dark: #2c3e50;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-color); 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-dark);
        }

        .card { 
            background: #fff; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            max-width: 420px; 
            width: 90%;
            transition: transform 0.3s ease;
        }

        .header-logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .header-logo h2 { 
            color: var(--primary-red); 
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0;
        }

        .header-logo p {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
            text-transform: uppercase;
        }

        label { 
            font-weight: 600; 
            display: block; 
            margin-top: 15px; 
            font-size: 14px;
            color: #555;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            margin-top: 8px; 
            border: 2px solid #edf2f7; 
            border-radius: 12px; 
            box-sizing: border-box; 
            outline: none;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1);
        }

        .btn { 
            width: 100%; 
            padding: 16px; 
            margin-top: 20px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 16px;
            cursor: pointer; 
            color: #fff; 
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-red { 
            background: linear-gradient(135deg, #ff5252 0%, #d32f2f 100%);
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.3);
        }

        .btn-red:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(211, 47, 47, 0.4); }

        .btn-blue { 
            background: linear-gradient(135deg, #42a5f5 0%, #1a73e8 100%);
            box-shadow: 0 4px 15px rgba(26, 115, 232, 0.3);
        }

        .btn-blue:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26, 115, 232, 0.4); }

        /* SỬA NÚT MAP BỊ LỆCH TẠI ĐÂY */
        #mapLink {
            margin-top: 15px; /* Tạo khoảng cách với nút phía trên */
            text-decoration: none;
            text-align: center;
            display: block;
        }

        .forgot-btn {
            background: none; border: none; color: var(--primary-blue); 
            cursor: pointer; width: 100%; margin-top: 15px; 
            font-weight: 600; font-size: 13px;
        }

        .hidden { display: none; }

        .info-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            border: 1px dashed #cbd5e0;
            margin-bottom: 20px;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: var(--primary-blue);
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header-logo">
        <h2>SMART GUARD</h2>
        <p>Hệ thống giám sát balo thông minh</p>
    </div>

    <div id="loginSection">
        <label>ID THIẾT BỊ</label>
        <input type="text" id="regId" placeholder="Nhập ID (Ví dụ: 1)">
        
        <label>MẬT KHẨU</label>
        <input type="password" id="regPass" placeholder="••••••••">
        
        <button class="btn btn-red" onclick="accessBalo()">VÀO HỆ THỐNG</button>
        <button class="forgot-btn" onclick="startForgotPass()">Quên mật khẩu?</button>
    </div>

    <div id="otpSection" class="hidden">
        <div class="info-box">
            <p style="color: var(--primary-blue); text-align: center; margin: 0; font-weight: 600;">
                Mã xác thực đã gửi đến Gmail
            </p>
        </div>
        <input type="text" id="otpInput" placeholder="Nhập 6 số OTP" maxlength="6" style="text-align: center; letter-spacing: 5px; font-size: 24px;">
        <button class="btn btn-blue" onclick="verifyOTP()">XÁC NHẬN MÃ</button>
    </div>

    <div id="infoSection" class="hidden">
        <div class="info-box">
            <label style="margin-top:0">Tên của trẻ</label>
            <input type="text" id="regName" placeholder="Tên bé...">
            
            <label>Gmail phụ huynh</label>
            <input type="email" id="regEmail" readonly style="background: #f1f1f1; cursor: not-allowed;">
        </div>

        <label>Đổi mật khẩu mới (Nếu cần)</label>
        <input type="password" id="newPass" placeholder="Bỏ trống nếu không đổi">

        <button class="btn btn-red" onclick="handleUpdate()">CẬP NHẬT THÔNG TIN</button>
        <a id="mapLink" href="#" target="_blank" class="btn btn-blue">
            XEM VỊ TRÍ HIỆN TẠI
        </a>
    </div>

    <div id="loading" class="loading-spinner">Đang xử lý dữ liệu...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://smartguard-25e26-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentOTP = "", flowType = "", tempEmail = "";

    function accessBalo() {
        const id = document.getElementById('regId').value.trim();
        const pass = document.getElementById('regPass').value;
        if(!id) return alert("Vui lòng nhập ID thiết bị!");

        toggleLoading(true);
        db.ref('SmartGuard/' + id).once('value', (snap) => {
            toggleLoading(false);
            const data = snap.val();
            if(!data) { 
                flowType = "REGISTER"; 
                tempEmail = prompt("Thiết bị chưa đăng ký. Nhập Gmail phụ huynh để bắt đầu:"); 
                if(tempEmail) sendOTP(tempEmail); 
            }
            else if(data.password === pass) { 
                showInfo(data); 
            }
            else { alert("Mật khẩu không chính xác!"); }
        });
    }

    function sendOTP(email) {
        currentOTP = Math.floor(100000 + Math.random() * 900000).toString();
        db.ref('OTP_Requests').set({ 
            to_email: email, 
            otp_code: currentOTP, 
            subject: flowType === "REGISTER" ? "XÁC THỰC ĐĂNG KÝ" : "KHÔI PHỤC MẬT KHẨU",
            timestamp: Date.now()
        });
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('otpSection').classList.remove('hidden');
    }

    function verifyOTP() {
        if(document.getElementById('otpInput').value === currentOTP) {
            if(flowType === "REGISTER") {
                const id = document.getElementById('regId').value.trim();
                const initialData = {
                    child_name: "Bé mới",
                    parent_email: tempEmail,
                    password: "123",
                    sos: 0,
                    vi_do: 21.0123,
                    kinh_do: 105.8123
                };
                db.ref('SmartGuard/' + id).set(initialData).then(() => {
                    showInfo(initialData);
                });
            } else {
                document.getElementById('otpSection').classList.add('hidden');
                document.getElementById('infoSection').classList.remove('hidden');
            }
        } else { alert("Mã OTP sai!"); }
    }

    function showInfo(data) {
        document.getElementById('otpSection').classList.add('hidden');
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('infoSection').classList.remove('hidden');
        document.getElementById('regName').value = data.child_name || "";
        document.getElementById('regEmail').value = data.parent_email || "";
        
        // SỬA LỖI TỌA ĐỘ UNDEFINED TẠI ĐÂY
        if (data.vi_do && data.kinh_do) {
            document.getElementById('mapLink').href = `https://www.google.com/maps?q=${data.vi_do},${data.kinh_do}`;
            document.getElementById('mapLink').innerText = "XEM VỊ TRÍ HIỆN TẠI";
            document.getElementById('mapLink').style.display = "block";
        } else {
            document.getElementById('mapLink').href = "#";
            document.getElementById('mapLink').innerText = "CHƯA CÓ TỌA ĐỘ";
        }
    }

    function handleUpdate() {
        const id = document.getElementById('regId').value.trim();
        const nPass = document.getElementById('newPass').value;
        const uData = { 
            child_name: document.getElementById('regName').value, 
            parent_email: document.getElementById('regEmail').value, 
            sos: 0 
        };
        if(nPass) uData.password = nPass;
        
        db.ref('SmartGuard/' + id).update(uData).then(() => { 
            alert("Đã cập nhật dữ liệu thành công!"); 
            location.reload(); 
        });
    }

    function startForgotPass() {
        const id = document.getElementById('regId').value.trim();
        if(!id) return alert("Vui lòng nhập ID để lấy lại mật khẩu!");
        db.ref('SmartGuard/' + id).once('value', (snap) => {
            const data = snap.val();
            if(data && data.parent_email) { 
                flowType = "FORGOT"; 
                sendOTP(data.parent_email); 
            } else { alert("Không tìm thấy thiết bị này trên hệ thống!"); }
        });
    }

    function toggleLoading(show) {
        document.getElementById('loading').style.display = show ? 'block' : 'none';
    }
</script>
</body>
</html>
