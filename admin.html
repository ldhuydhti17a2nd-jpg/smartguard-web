<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Smart Guard - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #cc0000; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; padding: 20px; margin: 0; }
        .admin-card { background: var(--card); padding: 30px; border-radius: 16px; max-width: 1000px; margin: 20px auto; }
        .stats-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .stat-item { background: #334155; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #475569; }
        .stat-item b { font-size: 28px; color: #38bdf8; display: block; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0; background: #fff; color: #1e293b; border-radius: 12px; overflow: hidden; }
        th { background: var(--primary); color: #fff; padding: 15px; text-transform: uppercase; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; }
        
        /* Màu hàng theo loại SOS */
        .row-sos-1 { background: #fff7ed !important; color: #c2410c; font-weight: bold; }
        .row-sos-2 { background: #fee2e2 !important; color: #991b1b; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        
        .btn-del { background: #ef4444; color: #fff; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2 style="text-align:center; letter-spacing:2px;">QUẢN TRỊ HỆ THỐNG</h2>
    <div id="auth" style="text-align:center; padding: 40px 0;">
        <input type="password" id="pass" placeholder="Mã Admin" style="padding:12px; border-radius:8px; border:none; width:200px;">
        <button onclick="login()" style="padding:12px 25px; border-radius:8px; border:none; background:var(--primary); color:white; cursor:pointer; font-weight:bold;">XÁC THỰC</button>
    </div>

    <div id="dash" style="display:none">
        <div class="stats-bar">
            <div class="stat-item">TỔNG THIẾT BỊ <b id="tDev">0</b></div>
            <div class="stat-item">ĐANG CẢNH BÁO <b id="tSos" style="color:#ef4444">0</b></div>
        </div>
        <table>
            <thead>
                <tr><th>ID</th><th>Tên Trẻ</th><th>Mật Khẩu</th><th>Trạng Thái</th><th>Thao Tác</th></tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://smartguard-25e26-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let oldData = {};

    function login() {
        if(document.getElementById('pass').value === "123") {
            document.getElementById('auth').style.display='none';
            document.getElementById('dash').style.display='block';
            startAdminListener();
        } else { alert("Mã sai!"); }
    }

    function startAdminListener() {
        db.ref('SmartGuard').on('value', (snap) => {
            const list = document.getElementById('list');
            let count = 0, sosCount = 0;
            list.innerHTML = "";
            
            snap.forEach(child => {
                count++;
                const d = child.val();
                const s = Number(d.sos || 0);
                const id = child.key;

                if(s !== 0) {
                    sosCount++;
                    if(!oldData[id] || oldData[id] === 0) alert(`🚨 THÔNG BÁO: Thiết bị #${id} có cảnh báo mới!`);
                }
                oldData[id] = s;

                let st = "✅ Bình thường", cl = "";
                if(s === 1) { st = "⚠️ NGOÀI VÙNG AN TOÀN"; cl = "row-sos-1"; }
                else if(s === 2) { st = "🚨 NHẤN NÚT SOS"; cl = "row-sos-2"; }

                list.innerHTML += `<tr class="${cl}">
                    <td><b>#${id}</b></td><td>${d.child_name}</td><td><code>${d.password}</code></td>
                    <td>${st}</td>
                    <td><button class="btn-del" onclick="del('${id}')">XÓA</button></td>
                </tr>`;
            });
            document.getElementById('tDev').innerText = count;
            document.getElementById('tSos').innerText = sosCount;
        });
    }

    function del(id) { if(confirm("Xóa ID " + id + "?")) db.ref('SmartGuard/' + id).remove(); }
</script>
</body>
</html>
