<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Guard - Admin Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #cc0000; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; padding: 20px; }
        .admin-card { background: var(--card); padding: 30px; border-radius: 16px; max-width: 1000px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h2 { text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; display: inline-block; }
        
        .stats-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; }
        .stat-item { background: #334155; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #475569; }
        .stat-item b { font-size: 24px; color: #38bdf8; display: block; margin-top: 5px; }

        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 10px; border-radius: 12px; overflow: hidden; background: #fff; color: #1e293b; }
        th { background: var(--primary); color: white; padding: 15px; text-transform: uppercase; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #e2e8f0; font-size: 14px; text-align: center; }
        
        /* Hiệu ứng nháy đỏ khi có SOS */
        .sos-row { background: #fee2e2 !important; color: #991b1b; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { background: #fee2e2; } 50% { background: #fecaca; } 100% { background: #fee2e2; } }
        
        .btn-del { background: #ef4444; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 8px; font-weight: 600; transition: 0.3s; }
        .btn-del:hover { background: #b91c1c; transform: scale(1.05); }
        
        #auth { text-align: center; padding: 50px 0; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; width: 250px; outline: none; text-align: center; }
        .btn-login { padding: 12px 25px; background: var(--primary); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; margin-left: 10px; }
    </style>
</head>
<body>

<div class="admin-card">
    <div style="text-align: center;"><h2>QUẢN TRỊ HỆ THỐNG</h2></div>

    <div id="auth">
        <input type="password" id="pass" placeholder="Mã bảo mật Admin">
        <button class="btn-login" onclick="login()">XÁC THỰC</button>
    </div>

    <div id="dash" style="display:none">
        <div class="stats-bar">
            <div class="stat-item">TỔNG THIẾT BỊ <b id="tDev">0</b></div>
            <div class="stat-item">ĐANG SOS <b id="tSos" style="color:#ff4d4d">0</b></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID Thiết Bị</th>
                    <th>Tên Trẻ Em</th>
                    <th>Mật Khẩu</th>
                    <th>Trạng Thái</th>
                    <th>Thao Tác</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://smartguard-25e26-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let lastSosState = {}; // Ghi nhớ trạng thái trước đó

    function login() {
        if(document.getElementById('pass').value === "123") {
            document.getElementById('auth').style.display='none';
            document.getElementById('dash').style.display='block';
            loadData();
        } else {
            alert("Sai mã Admin!");
        }
    }

    function loadData() {
        db.ref('SmartGuard').on('value', (snap) => {
            const listBody = document.getElementById('list');
            let count = 0, sosCount = 0; 
            listBody.innerHTML = "";
            
            snap.forEach(child => {
                count++; 
                const data = child.val(); 
                const deviceId = child.key;
                const currentSos = Number(data.sos || 0); // Đảm bảo kiểu số
                
                // NẾU PHÁT HIỆN SOS (Kể cả khi nó biến mất nhanh)
                if (currentSos !== 0 && (!lastSosState[deviceId] || lastSosState[deviceId] === 0)) {
                    // Hiện alert ngay để "giữ chân" người dùng nhìn thấy
                    alert(`🚨 CẢNH BÁO: Thiết bị #${deviceId} (${data.child_name || 'Nam'}) đang gửi tín hiệu SOS!`);
                }
                
                // Cập nhật bộ nhớ trạng thái
                lastSosState[deviceId] = currentSos;

                const isSos = currentSos !== 0; 
                if(isSos) sosCount++;
                
                listBody.innerHTML += `
                    <tr class="${isSos ? 'sos-row' : ''}">
                        <td><b>#${deviceId}</b></td>
                        <td>${data.child_name || 'Chưa đặt tên'}</td>
                        <td><code>${data.password || '---'}</code></td>
                        <td>
                            ${isSos ? 
                                '<span style="color:#cc0000">🚨 ĐANG SOS</span>' : 
                                '<span style="color:#16a34a">✅ Bình thường</span>'}
                        </td>
                        <td><button class="btn-del" onclick="del('${deviceId}')">XÓA</button></td>
                    </tr>`;
            });

            document.getElementById('tDev').innerText = count; 
            document.getElementById('tSos').innerText = sosCount;
        });
    }

    function del(id) { 
        if(confirm("Xác nhận xóa thiết bị " + id + " khỏi hệ thống?")) {
            db.ref('SmartGuard/' + id).remove(); 
        }
    }
</script>
</body>
</html>
